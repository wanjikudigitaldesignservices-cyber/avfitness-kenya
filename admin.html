<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AVFitness Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto',sans-serif;background:#0a0a0a;color:#e0e0e0}h1,h2{font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111}.lb{background:#222;padding:50px;border-top:5px solid #39FF14;max-width:400px;width:100%;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,0.5)}.lb h2{color:#fff;margin-bottom:24px;font-size:2rem;font-style:italic}.lb input{width:100%;padding:16px;border:1px solid #333;background:#111;color:#fff;margin-bottom:15px;font-size:1rem;font-family:'Roboto',sans-serif}.lb button{width:100%;padding:16px;background:#39FF14;color:#111;border:none;font-weight:700;cursor:pointer;font-size:1.1rem;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:2px;transform:skewX(-10deg);transition:0.3s}.lb button span{display:block;transform:skewX(10deg)}.lb button:hover{background:#2ce50e}
.dash{display:none}.dh{background:#111;color:white;padding:25px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;border-bottom:1px solid #222}.dh h1{font-size:1.8rem;color:#39FF14;font-style:italic}.dh button,.dh a{padding:10px 24px;border:2px solid #39FF14;cursor:pointer;font-size:0.9rem;color:#39FF14;background:transparent;text-decoration:none;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;transform:skewX(-10deg);font-weight:600;transition:0.3s}.dh button span,.dh a span{display:block;transform:skewX(10deg)}.dh button:hover,.dh a:hover{background:#39FF14;color:#111}.be{background:#39FF14!important;color:#111!important}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;padding:40px}.sc{background:#111;padding:30px;border:1px solid #222;border-left:4px solid #39FF14}.sl{font-size:0.85rem;color:#888;text-transform:uppercase;letter-spacing:1px;font-weight:700}.sv{font-size:3rem;font-family:'Oswald',sans-serif;margin-top:10px;color:#39FF14;font-style:italic;line-height:1}
.tw{padding:0 40px 40px;overflow-x:auto}table{width:100%;border-collapse:collapse;background:#111;border:1px solid #222}th{background:#0a0a0a;color:#888;padding:20px;text-align:left;font-size:0.9rem;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #222;font-family:'Oswald',sans-serif}td{padding:18px 20px;border-bottom:1px solid #222;font-size:0.95rem}
select.st{padding:8px 12px;border:1px solid #333;font-family:'Roboto',sans-serif;background:#0a0a0a;color:#fff;outline:none}.del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:0.9rem;text-transform:uppercase;letter-spacing:1px;font-family:'Oswald',sans-serif}
@media(max-width:768px){.stats{grid-template-columns:1fr}}</style></head>
<body>
<div class="login" id="ls"><div class="lb"><h2>AVFitness Portal</h2><input type="text" id="u" value="admin"><input type="password" id="p" placeholder="Password"><button onclick="login()"><span>Enter System</span></button></div></div>
<div class="dash" id="dash">
<div class="dh"><h1>Lead Manager</h1><div><button class="be" onclick="exp()"><span>Export</span></button> <a href="index.html"><span>View Site</span></a> <button onclick="logout()"><span>Logout</span></button></div></div>
<div class="stats"><div class="sc"><div class="sl">Total Leads</div><div class="sv" id="st">0</div></div><div class="sc"><div class="sl">New Leads</div><div class="sv" id="sn" style="color:#fff">0</div></div><div class="sc"><div class="sl">Converted</div><div class="sv" id="sd" style="color:#39FF14">0</div></div></div>
<div class="tw"><table><thead><tr><th>Date Rec'd</th><th>Name</th><th>Phone / Email</th><th>Interest</th><th>Start Date</th><th>Goals</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div></div>
<script>
const K='avfitness_leads';if(sessionStorage.getItem('avf_admin')==='true')showD();
function login(){if(document.getElementById('u').value==='admin'&&document.getElementById('p').value==='admin123'){sessionStorage.setItem('avf_admin','true');showD()}else alert('Invalid credentials')}
function logout(){sessionStorage.removeItem('avf_admin');location.reload()}
function showD(){document.getElementById('ls').style.display='none';document.getElementById('dash').style.display='block';render()}
function gd(){return JSON.parse(localStorage.getItem(K)||'[]').sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt))}
function sv(d){localStorage.setItem(K,JSON.stringify(d))}
function render(){const d=gd();document.getElementById('st').textContent=d.length;document.getElementById('sn').textContent=d.filter(x=>x.status==='New Lead').length;document.getElementById('sd').textContent=d.filter(x=>x.status==='Converted').length;
document.getElementById('tb').innerHTML=d.map(i=>`<tr><td>${new Date(i.submittedAt).toLocaleDateString('en-GB')}</td><td><strong>${i.name||'—'}</strong></td><td>${i.phone}<br><span style="color:#888;font-size:0.85rem">${i.email}</span></td><td style="color:#39FF14;font-family:'Oswald',sans-serif;text-transform:uppercase">${i.interest||'—'}</td><td>${i.date||'—'}</td><td>${i.goals||'—'}</td><td><select class="st" onchange="upd(${i.id},this.value)">${['New Lead','Contacted','Trial Active','Converted','Lost'].map(s=>`<option ${i.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><button class="del" onclick="del(${i.id})">Drop</button></td></tr>`).join('')}
function upd(id,s){const d=gd();const i=d.find(x=>x.id===id);if(i){i.status=s;sv(d);render()}}
function del(id){if(!confirm('Drop this lead?'))return;sv(gd().filter(x=>x.id!==id));render()}
function exp(){const d=gd();if(!d.length)return alert('No data');const h=['Received','Name','Phone','Email','Interest','Start Date','Goals','Status'];const r=d.map(i=>[new Date(i.submittedAt).toLocaleDateString(),i.name,i.phone,i.email,i.interest,i.date,i.goals,i.status]);const c=[h,...r].map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='avfitness_leads.csv';a.click()}
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script></body></html>
